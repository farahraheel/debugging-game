<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debugging Challenge - C Language</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:0.8;
    margin-bottom:20px;
}

.score{
    text-align:center;
    font-size:20px;
    color:#fbbf24;
    margin-bottom:15px;
}

.code-box{
    background:#0b1220;
    padding:20px;
    border-radius:12px;
    font-family: Consolas, monospace;
    font-size:16px;
    direction:ltr;
    white-space:pre;
    border:1px solid rgba(255,255,255,0.1);
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:120px;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:15px;
    outline:none;
    direction:ltr;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.result{
    text-align:center;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>💻 Debugging Challenge (C Language)</h1>
<p class="subtitle">اكتشف الخطأ في كود C وصححه</p>

<div class="score">
النقاط: <span id="score">0</span>
</div>

<div class="code-box" id="code"></div>

<textarea id="answer" placeholder="اكتب الكود الصحيح هنا..."></textarea>

<button onclick="checkAnswer()">تحقق</button>

<div class="result" id="result"></div>

</div>

<script>

let score = 0;
let current = 0;

const questions = [

{
code:`#include <stdio.h>

int main() {
    printf("Hello World")
    return 0;
}`,
answer:`#include <stdio.h>

int main() {
    printf("Hello World");
    return 0;
}`
},

{
code:`#include <stdio.h>

int main() {
    int x = 5
    printf("%d", x);
    return 0;
}`,
answer:`#include <stdio.h>

int main() {
    int x = 5;
    printf("%d", x);
    return 0;
}`
},

{
code:`#include <stdio.h>

int main() {
    for(int i = 0 i < 5; i++) {
        printf("%d", i);
    }
    return 0;
}`,
answer:`#include <stdio.h>

int main() {
    for(int i = 0; i < 5; i++) {
        printf("%d", i);
    }
    return 0;
}`
},

{
code:`#include <stdio.h>

int main() {
    int arr[3] = {1,2,3};
    printf("%d", arr[3]);
    return 0;
}`,
answer:`#include <stdio.h>

int main() {
    int arr[3] = {1,2,3};
    printf("%d", arr[2]);
    return 0;
}`
}

];

function loadQuestion(){
document.getElementById("code").innerText =
questions[current].code;

document.getElementById("answer").value = "";
document.getElementById("result").innerText = "";
}

function checkAnswer(){

let user =
document.getElementById("answer").value.replace(/\s/g,'');

let correct =
questions[current].answer.replace(/\s/g,'');

if(user === correct){

score++;
document.getElementById("score").innerText = score;

document.getElementById("result").innerText =
"✅ إجابة صحيحة";

current++;

if(current >= questions.length){
document.getElementById("code").innerText =
"🎉 مبروك! أكملت كل التحديات";

document.getElementById("answer").style.display = "none";
document.querySelector("button").style.display = "none";
return;
}

setTimeout(loadQuestion,1000);

}else{
document.getElementById("result").innerText =
"❌ حاول مرة أخرى";
}
}

loadQuestion();

</script>

</body>
</html>
