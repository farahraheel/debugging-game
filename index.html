<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Debugging Game</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#050816;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* ===== Start Screen ===== */
#startScreen{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#050816,#0b1023);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#startScreen h1{
    color:#00f5ff;
    font-size:40px;
    margin-bottom:10px;
}

#startScreen p{
    opacity:0.7;
    margin-bottom:20px;
}

#startBtn{
    padding:15px 40px;
    border:none;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    background:linear-gradient(90deg,#00f5ff,#a855f7);
    color:white;
}

/* ===== Game Container ===== */
.container{
    display:none;
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius:20px;
    padding:30px;
}

h1{
    text-align:center;
    color:#00f5ff;
}

.subtitle{
    text-align:center;
    opacity:0.7;
    margin-bottom:20px;
}

.code-box{
    background:#0b1023;
    padding:15px;
    border-radius:12px;
    font-family:Consolas;
    white-space:pre;
    direction:ltr;
    border:1px solid rgba(255,255,255,0.1);
    margin-bottom:10px;
}

textarea{
    width:100%;
    height:120px;
    border-radius:12px;
    border:none;
    padding:10px;
    direction:ltr;
    background:#0b1023;
    color:white;
    margin-bottom:10px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#00f5ff,#a855f7);
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* ===== Overlay Result ===== */
#overlay{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    font-size:30px;
}

#overlay button{
    margin-top:20px;
    padding:15px 30px;
}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
    <h1>💻 C++ Debugging Game</h1>
    <p>اضغط Start لبدء التحدي</p>
    <button id="startBtn" onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div class="container" id="game">

<h1>⚡ Debugging Challenge</h1>
<p class="subtitle">Syntax + Logic Errors</p>

<div class="code-box" id="code1"></div>
<textarea id="ans1" placeholder="تصحيح الخطأ النحوي"></textarea>

<div class="code-box" id="code2"></div>
<textarea id="ans2" placeholder="تصحيح الخطأ المنطقي"></textarea>

<button onclick="check()">Check</button>

</div>

<!-- RESULT -->
<div id="overlay">
    <div id="finalText"></div>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>

function startGame(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
}

function normalize(text){
    return text.replace(/\s/g,'');
}

function showResult(win){
    document.getElementById("overlay").style.display = "flex";
    const text = document.getElementById("finalText");

    if(win){
        text.innerHTML = "🎉 لقد ربحت! تهانينا";
        text.style.color = "#22c55e";
    }else{
        text.innerHTML = "❌ لم تفز";
        text.style.color = "#ef4444";
    }
}

function check(){

let a1 = normalize(document.getElementById("ans1").value);
let a2 = normalize(document.getElementById("ans2").value);

let syntaxAnswer = normalize(`
#include <iostream>
using namespace std;

int main() {
    cout << "Hello World";
    return 0;
}
`);

let logicAnswer = normalize(`
#include <iostream>
using namespace std;

int main() {
    int sum = 0;
    for(int i = 1; i <= 5; i++){
        sum += i;
    }
    cout << sum;
    return 0;
}
`);

if(a1 === syntaxAnswer && a2 === logicAnswer){
    showResult(true);
}else{
    showResult(false);
}

}

/* Questions */
document.getElementById("code1").innerText = `
#include <iostream>
using namespace std;

int main() {
    cout << "Hello World"
    return 0;
}
`;

document.getElementById("code2").innerText = `
#include <iostream>
using namespace std;

int main() {
    int sum = 0;
    for(int i = 1; i <= 5; i++){
        sum = i;
    }
    cout << sum;
    return 0;
}
`;

</script>

</body>
</html>
