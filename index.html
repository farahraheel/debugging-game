<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>C++ Debugging Game</title>

<style>
:root{
  --primary:#00f5ff;
  --secondary:#7000ff;
  --bg:#050816;
}

body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background-color: var(--bg);
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}

/* ===== START SCREEN ===== */
#startScreen {
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle at top right, #1a1f35, #050816);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.logo {
  width:150px;
  height:150px;
  border-radius:20px;
  overflow:hidden;
  border:2px solid var(--primary);
  box-shadow:0 0 30px rgba(0,245,255,0.3);
  margin-bottom:25px;
  transition:0.3s;
}

.logo:hover{
  transform:scale(1.05) rotate(3deg);
}

.logo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 25px;
  letter-spacing: 2px;
  text-align:center;
}

/* ===== LEVEL BUTTONS ===== */
.btn-group{
  display:flex;
  gap:15px;
}

.levelBtn {
  padding: 14px 28px;
  border: 1px solid var(--primary);
  background: transparent;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  transition:0.3s;
  min-width:110px;
}

.levelBtn:hover {
  background: var(--primary);
  color: #000;
  transform:scale(1.05);
}

/* ===== GAME ===== */
.container {
  display:none;
  width: 90%;
  max-width: 750px;
  background: rgba(255,255,255,0.03);
  padding: 35px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
}

#lvTitle{
  text-align:center;
  color:var(--primary);
}

.code-box {
  background: #000;
  padding: 20px;
  border-radius: 15px;
  font-family: 'Courier New', monospace;
  white-space: pre;
  border-left: 5px solid var(--secondary);
  margin: 10px 0 20px 0;
  color: #c1c1c1;
}

textarea {
  width: 100%;
  height: 70px;
  background: #111;
  border: 1px solid #333;
  color: var(--primary);
  border-radius: 10px;
  padding: 10px;
  box-sizing: border-box;
  margin-bottom:10px;
}

.submitBtn {
  margin-top: 10px;
  width:100%;
  background: linear-gradient(90deg, var(--primary), var(--secondary));
  border: none;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  color: white;
  font-size:16px;
}

/* ===== RESULT ===== */
#overlay {
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.9);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#finalText{
  font-size:40px;
  text-align:center;
}

</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">

  <div class="logo">
    <img src="IMG_5131.JPG">
  </div>

  <h1>C++ Debugging Master</h1>

  <div class="btn-group">
    <button class="levelBtn" onclick="startGame('easy')">EASY</button>
    <button class="levelBtn" onclick="startGame('medium')">MEDIUM</button>
    <button class="levelBtn" onclick="startGame('hard')">HARD</button>
  </div>

</div>

<!-- GAME -->
<div class="container" id="game">

  <h2 id="lvTitle">Level</h2>

  <p>Syntax Error:</p>
  <div class="code-box" id="code1"></div>
  <textarea id="ans1"></textarea>

  <p>Logic Error:</p>
  <div class="code-box" id="code2"></div>
  <textarea id="ans2"></textarea>

  <button class="submitBtn" onclick="check()">SUBMIT ANSWER</button>

</div>

<!-- RESULT -->
<div id="overlay">
  <h1 id="finalText"></h1>
  <button class="levelBtn" onclick="location.reload()">Play Again</button>
</div>

<script>

let level="easy";

function startGame(lv){
  level=lv;
  document.getElementById("startScreen").style.display="none";
  document.getElementById("game").style.display="block";
  document.getElementById("lvTitle").innerText = "Level: " + lv.toUpperCase();
  loadLevel();
}

/* ===== LEVELS (FIXED) ===== */
function loadLevel(){

if(level==="easy"){

document.getElementById("code1").innerText =
`#include <iostream>
using namespace std;

int main() {
    int x = 10
    cout << x;
    return 0;
}`;

document.getElementById("code2").innerText =
`#include <iostream>
using namespace std;

int main() {
    int age = 20;
    if(age > 18) cout << "Adult";
    else cout << "Child";
    return 0;
}`;
}

else if(level==="medium"){

document.getElementById("code1").innerText =
`#include <iostream>
using namespace std;

int main() {
    int x = 5
    cout << x;
    return 0;
}`;

document.getElementById("code2").innerText =
`#include <iostream>
using namespace std;

int main() {
    int sum = 0;
    for(int i = 1; i <= 5; i++){
        sum = i;
    }
    cout << sum;
    return 0;
}`;
}

else{

document.getElementById("code1").innerText =
`#include <iostream>
using namespace std;

int main() {
    for(int i = 0 i < 5; i++){
        cout << i << endl;
    }
    return 0;
}`;

document.getElementById("code2").innerText =
`#include <iostream>
using namespace std;

int main() {
    int arr[3] = {1,2,3};
    cout << arr[3];
    return 0;
}`;
}
}

/* ===== CHECK (FIXED) ===== */
function normalize(t){
return t.replace(/\s/g,'').toLowerCase();
}

function check(){

let a1 = normalize(document.getElementById("ans1").value);
let a2 = normalize(document.getElementById("ans2").value);

let ok=false;

/* EASY */
if(level==="easy"){
ok =
a1.includes("intx=10") &&
a2.includes("age>18");
}

/* MEDIUM */
else if(level==="medium"){
ok =
a1.includes("intx=5") &&
a2.includes("sum+=i");
}

/* HARD */
else{
ok =
a1.includes("for(inti=0;i<5;i++)") &&
a2.includes("arr[2]");
}

/* RESULT */
document.getElementById("overlay").style.display="flex";
document.getElementById("finalText").innerText =
ok ? "🎉 YOU WIN!" : "❌ TRY AGAIN";

document.getElementById("finalText").style.color =
ok ? "#22c55e" : "#ef4444";

}

</script>

</body>
</html>
