<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Debugging Game</title>

<style>
:root {
    --primary: #00f5ff;
    --secondary: #a855f7;
    --bg: #050816;
}

body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* ===== Start Screen ===== */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a1f35, #050816);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

#startScreen h1 {
    font-size: 3rem;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

#startBtn {
    margin-top: 20px;
    padding: 15px 50px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: white;
    transition: 0.3s;
}

#startBtn:hover {
    transform: scale(1.05);
}

/* ===== Game ===== */
.container {
    display: none;
    width: 90%;
    max-width: 850px;
    background: rgba(11, 16, 35, 0.85);
    border-radius: 25px;
    padding: 35px;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

.code-box {
    background: #000;
    padding: 20px;
    border-radius: 12px;
    font-family: Consolas;
    white-space: pre;
    text-align: left;
    border-left: 4px solid var(--primary);
    margin-bottom: 10px;
}

textarea {
    width: 100%;
    height: 90px;
    border-radius: 10px;
    border: none;
    padding: 10px;
    background: #1a1f35;
    color: var(--primary);
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: white;
    font-size: 18px;
    cursor: pointer;
}

/* ===== Overlay ===== */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 30px;
    text-align: center;
}

#overlay button {
    width: 200px;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
    <h1>💻 C++ Debugging Game</h1>
    <p>اختبر مهاراتك في تصحيح الأخطاء</p>
    <button id="startBtn" onclick="startGame()">ابدأ اللعبة</button>
</div>

<!-- GAME -->
<div class="container" id="game">

<h1 style="text-align:center;">⚡ Debugging Challenge</h1>

<p>🟥 الخطأ النحوي:</p>
<div class="code-box" id="code1"></div>
<textarea id="ans1" placeholder="اكتب التصحيح هنا..."></textarea>

<p>🟨 الخطأ المنطقي:</p>
<div class="code-box" id="code2"></div>
<textarea id="ans2" placeholder="اكتب التصحيح هنا..."></textarea>

<button onclick="check()">تحقق</button>

</div>

<!-- RESULT -->
<div id="overlay">
    <div id="finalText"></div>
    <button onclick="location.reload()">إعادة اللعب</button>
</div>

<script>

function startGame(){
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("game").style.display = "block";
}

function normalize(text){
    return text.replace(/\s/g,'');
}

function showResult(win){
    document.getElementById("overlay").style.display = "flex";
    const text = document.getElementById("finalText");

    text.innerHTML = win ? "🎉 لقد ربحت! تهانينا" : "❌ لم تفز حاول مجدداً";
    text.style.color = win ? "#22c55e" : "#ef4444";
}

/* ===== SMART CHECK ===== */
function check(){

let a1 = normalize(document.getElementById("ans1").value);
let a2 = normalize(document.getElementById("ans2").value);

/* Syntax: لازم يحتوي cout + ; */
let syntaxCorrect =
    a1.includes("cout<<\"HelloWorld\";") ||
    a1.includes("cout<<\"HelloWorld\"");

/* Logic: لازم يحتوي جمع */
let logicCorrect =
    a2.includes("sum+=i");

if(syntaxCorrect && logicCorrect){
    showResult(true);
}else{
    showResult(false);
}
}

/* ===== QUESTIONS ===== */
document.getElementById("code1").innerText =
`#include <iostream>
using namespace std;

int main() {
    cout << "Hello World"
    return 0;
}`;

document.getElementById("code2").innerText =
`#include <iostream>
using namespace std;

int main() {
    int sum = 0;
    for(int i = 1; i <= 5; i++){
        sum = i;
    }
    cout << sum;
    return 0;
}`;

</script>

</body>
</html>
