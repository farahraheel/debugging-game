<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Debugging Game</title>

<style>
body{
    margin:0;
    font-family: "Arial";
    background:#050816;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* glow background */
body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#00f5ff;
    filter:blur(120px);
    top:10%;
    left:10%;
    opacity:0.2;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#a855f7;
    filter:blur(120px);
    bottom:10%;
    right:10%;
    opacity:0.2;
}

.container{
    position:relative;
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 40px rgba(0,255,255,0.1);
}

h1{
    text-align:center;
    margin-bottom:5px;
    color:#00f5ff;
}

.subtitle{
    text-align:center;
    opacity:0.7;
    margin-bottom:20px;
}

.score{
    text-align:center;
    margin-bottom:20px;
    font-size:20px;
    color:#a855f7;
}

.code-card{
    background:#0b1023;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:15px;
    padding:20px;
    font-family: Consolas, monospace;
    white-space:pre;
    direction:ltr;
    font-size:15px;
    box-shadow:0 0 20px rgba(0,245,255,0.08);
    margin-bottom:20px;
}

textarea{
    width:100%;
    height:140px;
    border-radius:15px;
    border:none;
    padding:15px;
    font-size:15px;
    outline:none;
    direction:ltr;
    background:#0b1023;
    color:white;
    border:1px solid rgba(255,255,255,0.1);
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#00f5ff,#a855f7);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.result{
    text-align:center;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ C++ Debugging Challenge</h1>
<p class="subtitle">اكتشف الأخطاء في كود C++</p>

<div class="score">
🏆 Score: <span id="score">0</span>
</div>

<div class="code-card" id="code"></div>

<textarea id="answer" placeholder="اكتب الكود الصحيح هنا..."></textarea>

<button onclick="check()">Check Answer</button>

<div class="result" id="result"></div>

</div>

<script>

let score = 0;
let current = 0;

const questions = [

{
code:`#include <iostream>
using namespace std;

int main() {
    cout << "Hello World"
    return 0;
}`,
answer:`#include <iostream>
using namespace std;

int main() {
    cout << "Hello World";
    return 0;
}`
},

{
code:`#include <iostream>
using namespace std;

int main() {
    int x = 10
    cout << x;
    return 0;
}`,
answer:`#include <iostream>
using namespace std;

int main() {
    int x = 10;
    cout << x;
    return 0;
}`
},

{
code:`#include <iostream>
using namespace std;

int main() {
    for(int i = 0 i < 5; i++) {
        cout << i << endl;
    }
    return 0;
}`,
answer:`#include <iostream>
using namespace std;

int main() {
    for(int i = 0; i < 5; i++) {
        cout << i << endl;
    }
    return 0;
}`
},

{
code:`#include <iostream>
using namespace std;

int main() {
    int arr[3] = {1,2,3};
    cout << arr[3];
    return 0;
}`,
answer:`#include <iostream>
using namespace std;

int main() {
    int arr[3] = {1,2,3};
    cout << arr[2];
    return 0;
}`
}

];

function load(){
document.getElementById("code").innerText =
questions[current].code;

document.getElementById("answer").value = "";
document.getElementById("result").innerText = "";
}

function check(){

let user =
document.getElementById("answer").value.replace(/\s/g,'');

let correct =
questions[current].answer.replace(/\s/g,'');

if(user === correct){

score++;
document.getElementById("score").innerText = score;

document.getElementById("result").innerText =
"✅ Correct!";

current++;

if(current >= questions.length){
document.getElementById("code").innerText =
"🎉 You completed all challenges!";

document.getElementById("answer").style.display = "none";
document.querySelector("button").style.display = "none";
return;
}

setTimeout(load,1000);

}else{
document.getElementById("result").innerText =
"❌ Try again!";
}
}

load();

</script>

</body>
</html>
