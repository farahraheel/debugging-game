<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debugging Challenge C++</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#050816;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,255,255,0.1);
}

h1{
    text-align:center;
    color:#00f5ff;
}

.subtitle{
    text-align:center;
    opacity:0.7;
    margin-bottom:20px;
}

.code-box{
    background:#0b1023;
    padding:15px;
    border-radius:12px;
    font-family:Consolas;
    white-space:pre;
    direction:ltr;
    border:1px solid rgba(255,255,255,0.1);
    margin-bottom:10px;
}

.label{
    color:#a855f7;
    font-weight:bold;
    margin-top:10px;
}

textarea{
    width:100%;
    height:120px;
    border-radius:12px;
    border:none;
    padding:10px;
    direction:ltr;
    background:#0b1023;
    color:white;
    margin-bottom:10px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#00f5ff,#a855f7);
    color:white;
    font-size:18px;
    cursor:pointer;
}

.result{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ Debugging Challenge C++</h1>
<p class="subtitle">أصلح الخطأين (Syntax + Logic)</p>

<div class="label">🟥 الخطأ النحوي (Syntax Error)</div>
<div class="code-box" id="code1"></div>
<textarea id="ans1" placeholder="تصحيح الخطأ النحوي"></textarea>

<div class="label">🟨 الخطأ المنطقي (Logic Error)</div>
<div class="code-box" id="code2"></div>
<textarea id="ans2" placeholder="تصحيح الخطأ المنطقي"></textarea>

<button onclick="check()">تحقق</button>

<div class="result" id="result"></div>

</div>

<script>

const syntaxCode = `
#include <iostream>
using namespace std;

int main() {
    cout << "Hello World"
    return 0;
}
`;

const syntaxAnswer = `
#include <iostream>
using namespace std;

int main() {
    cout << "Hello World";
    return 0;
}
`;

const logicCode = `
#include <iostream>
using namespace std;

int main() {
    int sum = 0;
    for(int i = 1; i <= 5; i++){
        sum = i; // خطأ منطقي
    }
    cout << sum;
    return 0;
}
`;

const logicAnswer = `
#include <iostream>
using namespace std;

int main() {
    int sum = 0;
    for(int i = 1; i <= 5; i++){
        sum += i;
    }
    cout << sum;
    return 0;
}
`;

function normalize(text){
return text.replace(/\s/g,'');
}

function check(){

let a1 = normalize(document.getElementById("ans1").value);
let a2 = normalize(document.getElementById("ans2").value);

if(a1 === normalize(syntaxAnswer) && a2 === normalize(logicAnswer)){

document.getElementById("result").innerHTML =
"🎉 لقد ربحت! تهانينا";

document.getElementById("result").style.color = "#22c55e";

}else{

document.getElementById("result").innerHTML =
"❌ حاول مرة أخرى";
document.getElementById("result").style.color = "#ef4444";
}
}

document.getElementById("code1").innerText = syntaxCode;
document.getElementById("code2").innerText = logicCode;

</script>

</body>
</html>
