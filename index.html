<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة Debugging Challenge</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e3a8a,#0f766e);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:.8;
    margin-bottom:25px;
}

.code-box{
    background:#111827;
    padding:20px;
    border-radius:12px;
    font-family:Consolas, monospace;
    font-size:18px;
    direction:ltr;
    overflow:auto;
    margin-bottom:20px;
    border:1px solid rgba(255,255,255,.1);
}

textarea{
    width:100%;
    height:120px;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    resize:none;
    outline:none;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.score{
    text-align:center;
    margin-bottom:20px;
    font-size:22px;
    color:#fbbf24;
}
</style>
</head>

<body>

<div class="container">

<h1>💻 Debugging Challenge</h1>
<p class="subtitle">
اكتشف الخطأ في الكود واكتب الحل الصحيح
</p>

<div class="score">
النقاط: <span id="score">0</span>
</div>

<div class="code-box" id="code">
for i in range(5)
    print(i)
</div>

<textarea id="answer"
placeholder="اكتب التصحيح هنا..."></textarea>

<button onclick="checkAnswer()">
تحقق من الإجابة
</button>

<div class="result" id="result"></div>

</div>

<script>

let score = 0;
let current = 0;

const questions = [

{
code:`for i in range(5)
    print(i)`,
answer:`for i in range(5):
    print(i)`
},

{
code:`if x = 5:
   print("Hello")`,
answer:`if x == 5:
   print("Hello")`
},

{
code:`numbers = [1,2,3]
print(numbers[3])`,
answer:`print(numbers[2])`
},

{
code:`def hello()
   print("Hi")`,
answer:`def hello():
   print("Hi")`
}

];

function loadQuestion(){
document.getElementById("code").innerText =
questions[current].code;

document.getElementById("answer").value="";
document.getElementById("result").innerHTML="";
}

function checkAnswer(){

let user =
document.getElementById("answer")
.value
.replace(/\s/g,'');

let correct =
questions[current]
.answer
.replace(/\s/g,'');

if(user === correct){

score++;

document.getElementById("score")
.innerText = score;

document.getElementById("result")
.innerHTML =
"✅ إجابة صحيحة";

current++;

if(current >= questions.length){

document.getElementById("code").innerHTML =
"🎉 أحسنت! أكملت جميع التحديات";

document.getElementById("answer").style.display =
"none";

document.querySelector("button").style.display =
"none";

return;
}

setTimeout(loadQuestion,1200);

}else{

document.getElementById("result")
.innerHTML =
"❌ حاول مرة أخرى";
}
}

loadQuestion();

</script>

</body>
</html>
