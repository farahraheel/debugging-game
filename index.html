<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Debugging Game</title>

<style>
:root {
    --primary: #00f5ff;
    --secondary: #a855f7;
    --bg: #050816;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* START */
#startScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #1a1f35, #050816);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.logo-placeholder {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    margin-bottom: 20px;
    overflow: hidden;
}

.logo-placeholder img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.levelBtn {
    padding: 12px 25px;
    margin: 8px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: white;
}

/* GAME */
.container {
    display: none;
    width: 90%;
    max-width: 850px;
    background: rgba(11, 16, 35, 0.85);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
}

.code-box {
    background: #000;
    padding: 15px;
    border-radius: 10px;
    font-family: monospace;
    white-space: pre;
    border-left: 4px solid var(--primary);
    margin-bottom: 10px;
}

textarea {
    width: 100%;
    height: 80px;
    padding: 10px;
    margin-bottom: 10px;
    background: #1a1f35;
    color: white;
    border: none;
    border-radius: 8px;
}

button {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

/* RESULT */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

</style>
</head>

<body>

<!-- START -->
<div id="startScreen">

    <div class="logo-placeholder">
        <img src="IMG_5131.JPG">
    </div>

    <h1>C++ Debugging Game</h1>

    <button class="levelBtn" onclick="startGame('easy')">Easy</button>
    <button class="levelBtn" onclick="startGame('medium')">Medium</button>
    <button class="levelBtn" onclick="startGame('hard')">Hard</button>

</div>

<!-- GAME -->
<div class="container" id="game">

<h2>Debugging Challenge ⚡</h2>

<p>Syntax Error:</p>
<div class="code-box" id="code1"></div>
<textarea id="ans1"></textarea>

<p>Logic Error:</p>
<div class="code-box" id="code2"></div>
<textarea id="ans2"></textarea>

<button onclick="check()">Submit</button>

</div>

<!-- RESULT -->
<div id="overlay">
    <h1 id="finalText"></h1>
</div>

<script>

let level="easy";

function startGame(lv){
    level=lv;
    document.getElementById("startScreen").style.display="none";
    document.getElementById("game").style.display="block";
    loadLevel();
}

/* LEVELS */
function loadLevel(){

if(level==="easy"){

document.getElementById("code1").innerText =
`#include <iostream>
using namespace std;

int main() {
    int x = 10
    cout << x;
    return 0;
}`;

document.getElementById("code2").innerText =
`#include <iostream>
using namespace std;

int main() {
    int age = 20;
    if(age > 18) cout << "Adult";
    else cout << "Child";
    return 0;
}`;
}

else if(level==="medium"){

document.getElementById("code1").innerText =
`#include <iostream>
using namespace std;

int main() {
    int x = 5
    cout << x;
    return 0;
}`;

document.getElementById("code2").innerText =
`#include <iostream>
using namespace std;

int main() {
    int sum = 0;
    for(int i = 1; i <= 5; i++){
        sum = i;
    }
    cout << sum;
    return 0;
}`;
}

else{

document.getElementById("code1").innerText =
`#include <iostream>
using namespace std;

int main() {
    for(int i = 0 i < 5; i++){
        cout << i << endl;
    }
    return 0;
}`;

document.getElementById("code2").innerText =
`#include <iostream>
using namespace std;

int main() {
    int arr[3] = {1,2,3};
    cout << arr[3];
    return 0;
}`;
}
}

/* CHECK */
function normalize(t){
return t.replace(/\s/g,'').toLowerCase();
}

function check(){

let a1 = normalize(document.getElementById("ans1").value);
let a2 = normalize(document.getElementById("ans2").value);

let ok=false;

/* EASY */
if(level==="easy"){
ok =
a1.includes("intx=10") &&
a2.includes("age>18");
}

/* MEDIUM */
else if(level==="medium"){
ok =
a1.includes("intx=5") &&
a2.includes("sum+=i");
}

/* HARD */
else{
ok =
a1.includes("for(inti=0;i<5;i++)") &&
a2.includes("arr[2]");
}

/* RESULT */
document.getElementById("overlay").style.display="flex";
document.getElementById("finalText").innerText =
ok ? "🎉 YOU WIN!" : "❌ TRY AGAIN";

document.getElementById("finalText").style.color =
ok ? "#22c55e" : "#ef4444";

}

</script>

</body>
</html>
